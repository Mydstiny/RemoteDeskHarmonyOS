name: Deploy feedback QR Pages

on:
  push:
    branches: ['main']
    paths:
      - 'docs/feedback/**'
      - '.github/workflows/feedback-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare feedback-only static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/feedback
          cp docs/feedback/index.html site/index.html
          cp docs/feedback/chanlian.json site/feedback/chanlian.json
          cp docs/feedback/chanlian-current.jpg site/feedback/chanlian-current.jpg

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
